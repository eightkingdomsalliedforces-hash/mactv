name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build TVShell
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16 Toolchain
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            XCODE_16="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_16" ]; then
              sudo xcode-select -s "$XCODE_16"
            fi
          fi
          xcodebuild -version
          swift --version

      - name: Run Checks
        run: swift run TVShellChecks

      - name: Build Release Product
        run: swift build -c release --product TVShell

      - name: Package App Bundle
        run: |
          APP="dist/MacTV.app"
          mkdir -p "$APP/Contents/MacOS"
          cp .build/release/TVShell "$APP/Contents/MacOS/TVShell"
          chmod +x "$APP/Contents/MacOS/TVShell"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>zh_TW</string>
            <key>CFBundleExecutable</key>
            <string>TVShell</string>
            <key>CFBundleIdentifier</key>
            <string>com.mactv.tvshell</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>MacTV</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          PLIST
          (cd dist && zip -9 -r TVShell-macOS-${{ github.sha }}.zip MacTV.app)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVShell-macOS
          path: dist/TVShell-macOS-${{ github.sha }}.zip

      - name: Prepare Release Metadata
        if: github.event_name != 'pull_request'
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=MacTV ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "notes=Automated macOS release for ${GITHUB_REF_NAME}." >> "$GITHUB_OUTPUT"
            echo "mode=versioned" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "title=MacTV latest" >> "$GITHUB_OUTPUT"
            echo "notes=Automated macOS release from main at ${GITHUB_SHA}." >> "$GITHUB_OUTPUT"
            echo "mode=rolling" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          TITLE="${{ steps.release.outputs.title }}"
          NOTES="${{ steps.release.outputs.notes }}"
          ASSET="dist/TVShell-macOS-${{ github.sha }}.zip"

          if [[ "${{ steps.release.outputs.mode }}" == "rolling" ]]; then
            gh release delete "$TAG" --yes --cleanup-tag || true
            gh release create "$TAG" "$ASSET" \
              --target "${GITHUB_SHA}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          elif gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          else
            gh release create "$TAG" "$ASSET" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          fi
