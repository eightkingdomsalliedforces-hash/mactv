name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build TVShell
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16 Toolchain
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            XCODE_16="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort | tail -n 1 || true)"
            if [ -n "$XCODE_16" ]; then
              sudo xcode-select -s "$XCODE_16"
            fi
          fi
          xcodebuild -version
          swift --version

      - name: Run Checks
        run: swift run TVShellChecks

      - name: Build Release Product
        run: swift build -c release --product TVShell

      - name: Resolve VLCKit
        id: vlckit
        run: |
          set -euo pipefail
          VLCKIT_METADATA="https://code.videolan.org/videolan/VLCKit/raw/master/Packaging/VLCKit.json"
          VLCKIT_URL="$(curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 "$VLCKIT_METADATA" | jq -r 'to_entries | sort_by(.key | split(".") | map(tonumber)) | last.value')"
          if [ -z "$VLCKIT_URL" ] || [ "$VLCKIT_URL" = "null" ]; then
            echo "Could not resolve VLCKit download URL from $VLCKIT_METADATA" >&2
            exit 1
          fi

          VLCKIT_CACHE_KEY="vlckit-$(printf '%s' "$VLCKIT_URL" | shasum -a 256 | awk '{print $1}')"
          echo "url=$VLCKIT_URL" >> "$GITHUB_OUTPUT"
          echo "cache-key=$VLCKIT_CACHE_KEY" >> "$GITHUB_OUTPUT"
          echo "VLCKIT_URL=$VLCKIT_URL" >> "$GITHUB_ENV"
          echo "VLCKIT_CACHE_KEY=$VLCKIT_CACHE_KEY" >> "$GITHUB_ENV"
          echo "Resolved VLCKit from $VLCKIT_URL"

      - name: Cache VLCKit Archive
        uses: actions/cache@v4
        with:
          path: .cache/VLCKit.tar.xz
          key: ${{ steps.vlckit.outputs.cache-key }}

      - name: Download VLCKit
        run: |
          set -euo pipefail

          mkdir -p ".cache" "$RUNNER_TEMP/vlckit"
          ARCHIVE=".cache/VLCKit.tar.xz"
          if [ ! -s "$ARCHIVE" ]; then
            curl -fL \
              --retry 10 \
              --retry-all-errors \
              --retry-delay 5 \
              --connect-timeout 30 \
              --speed-time 30 \
              --speed-limit 1024 \
              --continue-at - \
              --output "$ARCHIVE" \
              "$VLCKIT_URL"
          else
            echo "Using cached VLCKit archive for $VLCKIT_CACHE_KEY"
          fi
          tar -xJf "$ARCHIVE" -C "$RUNNER_TEMP/vlckit"

          VLCKIT_FRAMEWORK="$(find "$RUNNER_TEMP/vlckit" -name VLCKit.framework -type d | head -n 1)"
          if [ -z "$VLCKIT_FRAMEWORK" ] || [ ! -d "$VLCKIT_FRAMEWORK" ]; then
            echo "VLCKit.framework was not found after extracting $VLCKIT_URL" >&2
            find "$RUNNER_TEMP/vlckit" -maxdepth 4 -print
            exit 1
          fi

          echo "VLCKIT_FRAMEWORK=$VLCKIT_FRAMEWORK" >> "$GITHUB_ENV"
          echo "Using VLCKit from $VLCKIT_URL"

      - name: Package App Bundle
        run: |
          set -euo pipefail
          APP="dist/TVShell.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"
          cp .build/release/TVShell "$APP/Contents/MacOS/TVShell"
          chmod +x "$APP/Contents/MacOS/TVShell"
          cp -R "$VLCKIT_FRAMEWORK" "$APP/Contents/Frameworks/VLCKit.framework"
          xattr -cr "$APP/Contents/Frameworks/VLCKit.framework" || true
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>zh_TW</string>
            <key>CFBundleExecutable</key>
            <string>TVShell</string>
            <key>CFBundleIdentifier</key>
            <string>com.tvshell.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>TVShell</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          PLIST
          cat > "$APP/Contents/Resources/ThirdPartyNotices.txt" <<NOTICE
          TVShell embeds VideoLAN VLCKit for broad local and streaming media playback.

          VLCKit is distributed by VideoLAN under LGPL-2.1-or-later.
          Source and license information: https://code.videolan.org/videolan/VLCKit
          Binary metadata used by this build: https://code.videolan.org/videolan/VLCKit/raw/master/Packaging/VLCKit.json
          Download used by this build: ${VLCKIT_URL}
          NOTICE
          codesign --force --deep --sign - "$APP"
          (cd dist && zip -9 -r TVShell-macOS-${{ github.sha }}.zip TVShell.app)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVShell-macOS
          path: dist/TVShell-macOS-${{ github.sha }}.zip

      - name: Prepare Release Metadata
        if: github.event_name != 'pull_request'
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=TVShell ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "notes=Automated macOS release for ${GITHUB_REF_NAME}." >> "$GITHUB_OUTPUT"
            echo "mode=versioned" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "title=TVShell latest" >> "$GITHUB_OUTPUT"
            echo "notes=Automated macOS release from main at ${GITHUB_SHA}." >> "$GITHUB_OUTPUT"
            echo "mode=rolling" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          TITLE="${{ steps.release.outputs.title }}"
          NOTES="${{ steps.release.outputs.notes }}"
          ASSET="dist/TVShell-macOS-${{ github.sha }}.zip"

          if [[ "${{ steps.release.outputs.mode }}" == "rolling" ]]; then
            gh release delete "$TAG" --yes --cleanup-tag || true
            gh release create "$TAG" "$ASSET" \
              --target "${GITHUB_SHA}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          elif gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          else
            gh release create "$TAG" "$ASSET" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest
          fi
